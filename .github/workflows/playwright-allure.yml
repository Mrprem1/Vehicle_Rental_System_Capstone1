# Playwright E2E tests + Allure HTML report.
# - Every run uploads the Allure report as a downloadable Actions artifact.
# - On push to main/master, also publishes the report to GitHub Pages (static site).
#
# Setup in the repo:
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
# 2. Push this workflow; after the first successful run, open the Pages URL (repo Settings → Pages).

name: Playwright & Allure

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Needed for actions/upload-pages-artifact and deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-allure:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bike_rental
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=12

    env:
      CI: true
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: bike_rental
      JWT_SECRET: ci_github_actions_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: '3000'
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Initialize database
        run: npm run db:init

      - name: Run Playwright tests
        run: npm test

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Pages artifact
        if: >
          always() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

  deploy-github-pages:
    if: >
      always() &&
      !cancelled() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: test-and-allure
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
